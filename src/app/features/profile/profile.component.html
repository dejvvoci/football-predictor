<section class="auth-page">
  <h1>My Profile</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <label>
      Name
      <input type="text" formControlName="displayName" />
    </label>
    @if (form.controls.displayName.invalid && form.controls.displayName.touched) {
      <p class="field-error">Name must be 2-40 characters.</p>
    }

    @if (successMessage()) {
      <p class="success-message">{{ successMessage() }}</p>
    }
    @if (errorMessage()) {
      <p class="form-error">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Saving...' : 'Save changes' }}
    </button>
  </form>

  <button type="button" class="logout-btn" [disabled]="loggingOut()" (click)="logout()">
    {{ loggingOut() ? 'Logging out...' : 'Log out' }}
  </button>
</section>
