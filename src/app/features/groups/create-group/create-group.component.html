<section class="auth-page">
  <h1>Krijo grup</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <label>
      Emri i grupit
      <input type="text" formControlName="name" placeholder="Emri i grupit" />
    </label>
    @if (form.controls.name.invalid && form.controls.name.touched) {
      <p class="field-error">Emri duhet të ketë 2-40 karaktere.</p>
    }

    @if (errorMessage()) {
      <p class="form-error">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Duke krijuar...' : 'Krijo grupin' }}
    </button>
  </form>

  <a routerLink="/groups" class="back-link">← Kthehu te grupet</a>
</section>
