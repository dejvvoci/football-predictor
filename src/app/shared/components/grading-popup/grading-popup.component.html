@if (visible()) {
  <div class="overlay" (click)="dismiss()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2>📣 Rezultatet e fundit</h2>

      <div class="items">
        @for (item of items(); track item.predictionId) {
          <div class="item">
            <div class="teams">{{ item.homeTeam }} vs {{ item.awayTeam }}</div>
            <div class="detail">
              <span>Parashikove <strong>{{ item.choice }}</strong></span>
              <span class="points" [class.zero]="item.points === 0">+{{ item.points }} pikë</span>
            </div>
          </div>
        }
      </div>

      <button type="button" class="close-btn" (click)="dismiss()">Mbylle</button>
    </div>
  </div>
}
