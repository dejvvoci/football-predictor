name: Sync Matches

on:
  schedule:
    - cron: '*/5 12-23 * * *'   # every 5 min, 12:00–23:59 UTC (match hours)
    - cron: '0 * 0-11 * * *'    # every hour, 00:00–11:59 UTC (night)
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts/sync-matches
        run: npm install

      - name: Run sync (daily challenges + tournament + odds + achievements)
        working-directory: scripts/sync-matches
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npm run sync